services:
  # 1. ฐานข้อมูล PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: gold_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gold_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. ฝั่ง Backend (Node.js)
  backend:
    build: 
      context: ./backend
    container_name: gold_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=gold_db
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

  # 3. ฝั่ง Frontend (Next.js)
  frontend:
    build: 
      context: ./frontend
    container_name: gold_frontend
    restart: always
    ports:
      - "4000:3000"
    environment:
      # แก้เป็น localhost เพื่อให้เบราว์เซอร์รู้จักและคุยกับ Backend ได้
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
  
  adminer:
    image: adminer
    container_name: gold_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
  
  