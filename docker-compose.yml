version: '3.8'

services:
  # ฝั่ง Backend (Go)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: gold_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # เอาลิงก์ของ Neon มาใส่ตรงนี้ (อย่าลืมใส่ของคุณเองนะ)
      - DATABASE_URL=postgresql://neondb_owner:npg_JCnKjdaXtg69@ep-rapid-firefly-aozo08i0.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
    volumes:
      - ./backend:/app

  # ฝั่ง Frontend (Next.js)
  frontend:
    build: 
      context: ./frontend
    container_name: gold_frontend
    restart: always
    ports:
      - "4000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next